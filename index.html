<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LifeOS</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #020617, #0f172a);
  color: white;
  height: 100vh;
  overflow: hidden;
}

/* ===== Header ===== */
.header {
  text-align: center;
  margin-top: 30px;
  font-size: 28px;
  font-weight: bold;
}

/* ===== Blur Overlay ===== */
.blur {
  position: fixed;
  width: 100%;
  height: 100%;
  backdrop-filter: blur(10px);
  top: 0;
  left: 0;
  display: none;
}

/* ===== Bottom Nav ===== */
.nav {
  position: fixed;
  bottom: 20px;
  width: 100%;
  display: flex;
  justify-content: space-evenly;
  align-items: center;
}

/* ===== Buttons ===== */
.circle {
  width: 60px;
  height: 60px;
  border-radius: 50%;
  background: rgba(30, 41, 59, 0.8);
  display: flex;
  align-items: center;
  justify-content: center;
  backdrop-filter: blur(10px);
  cursor: pointer;
  transition: 0.3s;
  font-size: 12px;
}

.circle:hover {
  transform: scale(1.1);
}

/* ===== Add Button ===== */
.add {
  width: 75px;
  height: 75px;
  background: linear-gradient(135deg, #3b82f6, #06b6d4);
  font-size: 20px;
  box-shadow: 0 0 25px rgba(59,130,246,0.7);
}

/* ===== Hidden Buttons ===== */
.hidden {
  display: none;
}

/* ===== Popup Menu ===== */
.menu {
  position: fixed;
  bottom: 100px;
  left: 50%;
  transform: translateX(-50%);
  display: none;
  flex-direction: column-reverse;
  gap: 15px;
}

.menu .circle {
  width: 65px;
  height: 65px;
  background: rgba(15, 23, 42, 0.9);
  font-size: 12px;
}

/* Animation */
.menu .circle {
  animation: fadeUp 0.3s ease;
}

@keyframes fadeUp {
  from {opacity:0; transform: translateY(20px);}
  to {opacity:1; transform: translateY(0);}
}

</style>
</head>

<body>

<div class="header">LifeOS</div>

<div class="blur" id="blur"></div>

<!-- Bottom Nav -->
<div class="nav" id="nav">
  <div class="circle">Manager</div>
  <div class="circle">Today</div>

  <div class="circle add" onclick="toggleMenu()">＋</div>

  <div class="circle">Streak</div>
  <div class="circle">User</div>
</div>

<!-- Popup Menu -->
<div class="menu" id="menu">
  <div class="circle">Year</div>
  <div class="circle">Month</div>
  <div class="circle">Week</div>
  <div class="circle">Task</div>
</div>

<script>
let open = false;

function toggleMenu() {
  const menu = document.getElementById("menu");
  const blur = document.getElementById("blur");
  const nav = document.getElementById("nav");

  open = !open;

  if (open) {
    menu.style.display = "flex";
    blur.style.display = "block";

    // hide other buttons
    [...nav.children].forEach((el, i) => {
      if (!el.classList.contains("add")) {
        el.classList.add("hidden");
      }
    });

  } else {
    menu.style.display = "none";
    blur.style.display = "none";

    [...nav.children].forEach(el => {
      el.classList.remove("hidden");
    });
  }
}

// close when clicking blur
document.getElementById("blur").onclick = () => {
  if (open) toggleMenu();
}
</script>

</body>
</html>
