<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LifeOS</title>

<style>
body {
  margin:0;
  font-family:'Segoe UI';
  transition:0.3s;
}

/* LIGHT MODE */
body.light {
  background:#f1f5f9;
  color:#0f172a;
}

/* DARK MODE */
body.dark {
  background:#020617;
  color:white;
}

/* HEADER */
.header {text-align:center;margin-top:30px;font-size:28px;}
.streak {text-align:center;font-size:20px;}

/* NAV */
.nav {
  position:fixed;
  bottom:20px;
  width:100%;
  display:flex;
  justify-content:space-evenly;
}

.circle {
  width:55px;height:55px;border-radius:50%;
  background:rgba(0,0,0,0.1);
  display:flex;align-items:center;justify-content:center;
  font-size:22px;
  transition:0.4s;
}

body.dark .circle {
  background:rgba(255,255,255,0.1);
}

/* CENTER BUTTON */
.center {
  position:fixed !important;
  bottom:80px;
  left:50%;
  transform:translateX(-50%) scale(1.5);
  z-index:10;
}

/* HIDDEN */
.hidden {opacity:0;transform:scale(0.6);}

/* PAGE */
.page {
  position:fixed;
  bottom:-100%;
  width:100%;height:70%;
  background:rgba(255,255,255,0.95);
  transition:0.4s;
  border-radius:20px 20px 0 0;
  padding:20px;
}

body.dark .page {
  background:rgba(15,23,42,0.95);
}

.page.active {bottom:0;}

/* BLUR */
.blur {
  position:fixed;width:100%;height:100%;
  backdrop-filter:blur(6px);
  background:rgba(0,0,0,0.2);
  display:none;
}

/* HOME BUTTON */
.home-btn {
  position:absolute;
  right:20px;
  top:20px;
  font-size:22px;
  cursor:pointer;
}

/* CREATE */
.create {
  position:fixed;
  top:0;left:0;width:100%;height:100%;
  background:white;
  display:none;
  padding:20px;
}

body.dark .create {background:#020617;}

input,textarea {
  width:100%;padding:10px;margin:10px 0;
  border-radius:10px;border:none;
}

/* FLAME */
.flame {
  font-size:30px;
  filter:grayscale(1);
  transition:0.3s;
}

.flame.active {
  filter:none;
  transform:scale(1.2);
}

/* MENU */
.menu {
  position:fixed;
  bottom:120px;
  left:50%;
  transform:translateX(-50%);
  display:none;
  flex-direction:column-reverse;
  gap:10px;
}

.menu div {
  background:#3b82f6;
  color:white;
  padding:10px 20px;
  border-radius:10px;
  text-align:center;
}
</style>
</head>

<body class="light">

<div class="header">LifeOS</div>
<div class="streak">🔥 <span id="streakNum">0</span></div>

<div class="blur" id="blur"></div>

<!-- PAGES -->
<div class="page" id="manager">
  <div class="home-btn" onclick="goHome()">🏠</div>
  <h3>Manager</h3>
</div>

<div class="page" id="today">
  <div class="home-btn" onclick="goHome()">🏠</div>
  <h3>Today</h3>
</div>

<div class="page" id="streakPage">
  <div class="home-btn" onclick="goHome()">🏠</div>
  <h3>Streak</h3>
</div>

<div class="page" id="user">
  <div class="home-btn" onclick="goHome()">🏠</div>
  <h3>User</h3>
  <button onclick="toggleMode()">Toggle Mode</button>
</div>

<!-- CREATE -->
<div class="create" id="create">
  <h2 id="createTitle"></h2>

  <input placeholder="Title">
  <textarea placeholder="Description"></textarea>

  <div class="flame" id="flame" onclick="toggleFlame()">🔥</div>
</div>

<!-- NAV -->
<div class="nav" id="nav">
  <div class="circle" onclick="openPage(this,'manager')">🗂</div>
  <div class="circle" onclick="openPage(this,'today')">☀️</div>
  <div class="circle" onclick="toggleMenu()">➕</div>
  <div class="circle" onclick="openPage(this,'streakPage')">🔥</div>
  <div class="circle" onclick="openPage(this,'user')">👤</div>
</div>

<!-- MENU -->
<div class="menu" id="menu">
  <div onclick="openCreate('Goal')">Goal</div>
  <div onclick="openCreate('Plan')">Plan</div>
  <div onclick="openCreate('Task')">Task</div>
</div>

<script>
let active=null;

function openPage(btn,id){
  let page=document.getElementById(id);

  if(active===btn){
    goHome();
    return;
  }

  document.querySelectorAll(".circle").forEach(e=>e.classList.add("hidden"));

  btn.classList.remove("hidden");
  btn.classList.add("center");

  page.classList.add("active");
  blur.style.display="block";

  active=btn;
}

function goHome(){
  document.querySelectorAll(".circle").forEach(e=>{
    e.classList.remove("hidden","center");
  });

  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));

  blur.style.display="none";
  active=null;
}

/* MENU */
function toggleMenu(){
  menu.style.display = menu.style.display==="flex"?"none":"flex";
}

/* CREATE */
function openCreate(type){
  create.style.display="block";
  createTitle.innerText="Create "+type;
  nav.style.display="none";
  menu.style.display="none";
}

/* FLAME */
function toggleFlame(){
  flame.classList.toggle("active");
  navigator.vibrate(50);
}

/* MODE */
function toggleMode(){
  document.body.classList.toggle("dark");
  document.body.classList.toggle("light");
}
</script>

</body>
</html>
